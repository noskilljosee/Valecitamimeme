<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juguemos 💖</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
    color:white;
}

h1{
    margin-top:60px;
    font-size:26px;
    animation: fadeIn 1s ease;
}

.botones{
    margin-top:40px;
    position:relative;
}

button{
    border:none;
    border-radius:12px;
    padding:15px 25px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
    transition:0.3s;
}

#si{
    background:#00c853;
    color:white;
    z-index:2;
}

#no{
    background:#ff1744;
    color:white;
    position:absolute;
}

#imagenes img{
    width:80px;
    margin:5px;
    border-radius:12px;
    animation: pop 0.5s ease;
}

#final{
    display:none;
}

#final h1{
    font-size:30px;
    animation: zoom 1s ease;
}

#final img{
    width:220px;
    border-radius:15px;
    margin-top:20px;
}

/* corazones */
.corazon{
    position:absolute;
    color:#ff4081;
    font-size:20px;
    animation: floatUp 3s linear infinite;
}

/* animaciones */
@keyframes floatUp{
    0%{transform:translateY(0); opacity:1;}
    100%{transform:translateY(-600px); opacity:0;}
}

@keyframes pop{
    0%{transform:scale(0);}
    100%{transform:scale(1);}
}

@keyframes zoom{
    0%{transform:scale(0);}
    100%{transform:scale(1);}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<!-- MUSICA -->
<audio id="music" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<h1 id="titulo">Hola ¿quieres jugar conmigo? 💖</h1>

<div class="botones">
    <button id="si">Sí 💕</button>
    <button id="no">No 😢</button>
</div>

<div id="imagenes"></div>

<div id="final">
    <h1>Te amo 💖, juguemos mini</h1>
    <img src="final.jpg">
</div>

<script>
let contador=0;
let tamaño=18;

const mensajes=[
"¿Segura? 😳",
"¿De verdad segura? 🥺",
"Piénsalo otra vez 😭",
"Última oportunidad 😡"
];

const imagenes=[
["img1.jpg","img2.jpg","img3.jpg","img4.jpg"],
["img5.jpg","img6.jpg","img7.jpg","img8.jpg"],
["img9.jpg","img10.jpg","img11.jpg","img12.jpg"],
["img13.jpg","img14.jpg","img15.jpg","img16.jpg"]
];

const music = document.getElementById("music");

// activar música con cualquier toque
document.body.addEventListener("click", ()=>{
    music.play().catch(()=>{});
}, { once: true });

// mover botón NO
function moverNo(){
    let x=Math.random()*(window.innerWidth-100);
    let y=Math.random()*(window.innerHeight-100);
    document.getElementById("no").style.left=x+"px";
    document.getElementById("no").style.top=y+"px";
}

document.getElementById("no").onclick=()=>{
    moverNo();

    if(contador<mensajes.length){
        document.getElementById("titulo").innerText=mensajes[contador];

        let cont=document.getElementById("imagenes");
        cont.innerHTML="";
        imagenes[contador].forEach(src=>{
            let img=document.createElement("img");
            img.src=src;
            cont.appendChild(img);
        });

        contador++;

        tamaño+=12;
        let si=document.getElementById("si");
        si.style.fontSize=tamaño+"px";
        si.style.padding=(tamaño/2)+"px";

    }else{
        document.getElementById("titulo").innerText="Ya no puedes decir que no 😈";
    }
};

// botón SI
document.getElementById("si").onclick=()=>{
    document.querySelector(".botones").style.display="none";
    document.getElementById("imagenes").style.display="none";
    document.getElementById("titulo").style.display="none";

    document.getElementById("final").style.display="block";

    lanzarCorazones();
    fuegos();
};

// corazones
function lanzarCorazones(){
    setInterval(()=>{
        let heart=document.createElement("div");
        heart.className="corazon";
        heart.innerText="💖";
        heart.style.left=Math.random()*window.innerWidth+"px";
        heart.style.top="100%";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),3000);
    },200);
}

// fuegos artificiales
function fuegos(){
    setInterval(()=>{
        let fire=document.createElement("div");
        fire.innerText="✨";
        fire.style.position="absolute";
        fire.style.left=Math.random()*window.innerWidth+"px";
        fire.style.top=Math.random()*window.innerHeight+"px";
        fire.style.fontSize="30px";
        document.body.appendChild(fire);

        setTimeout(()=>fire.remove(),1000);
    },300);
}

// iniciar posición
moverNo();
</script>

</body>
</html>
