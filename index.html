<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juguemos 💖</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
    color:white;
}

h1{
    margin-top:60px;
    font-size:26px;
    animation: fadeIn 1s ease;
}

.botones{
    margin-top:40px;
    position:relative;
}

button{
    border:none;
    border-radius:12px;
    padding:15px 25px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
    transition:0.3s;
}

#si{
    background:#00c853;
    color:white;
    z-index:2;
}

#no{
    background:#ff1744;
    color:white;
    position:absolute;
}

#imagenes img{
    width:80%;
    max-width:300px;
    margin-top:20px;
    border-radius:15px;
    animation: zoom 0.5s ease;
}

/* final */
#final{
    display:none;
}

#final img{
    width:250px;
    margin-top:20px;
    border-radius:15px;
}

/* corazones */
.corazon{
    position:absolute;
    font-size:20px;
    animation: floatUp 3s linear infinite;
}

/* animaciones */
@keyframes floatUp{
    0%{transform:translateY(0); opacity:1;}
    100%{transform:translateY(-600px); opacity:0;}
}

@keyframes zoom{
    0%{transform:scale(0);}
    100%{transform:scale(1);}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<h1 id="titulo">Hola ¿quieres jugar conmigo? 💖</h1>

<div class="botones">
    <button id="si">Sí 💕</button>
    <button id="no">No 😢</button>
</div>

<div id="imagenes"></div>

<div id="final">
    <h1>Te amo 💖, juguemos mini</h1>
    <img src="final.jpg">
</div>

<script>
let contador=0;
let tamaño=18;

const mensajes=[
"¿Segura? 😳",
"¿De verdad segura? 🥺",
"Piénsalo otra vez 😭",
"Última oportunidad 😡"
];

// 👇 SOLO 1 imagen por intento
const imagenes=[
"img1.jpg",
"img2.jpg",
"img3.jpg",
"img4.jpg"
];

const music=document.getElementById("music");

// activar música
document.body.addEventListener("click", ()=>{
    music.play().catch(()=>{});
}, {once:true});

// mover botón NO
function moverNo(){
    let x=Math.random()*(window.innerWidth-100);
    let y=Math.random()*(window.innerHeight-100);
    let btn=document.getElementById("no");
    btn.style.left=x+"px";
    btn.style.top=y+"px";
}

document.getElementById("no").onclick=()=>{
    moverNo();

    if(contador<mensajes.length){
        document.getElementById("titulo").innerText=mensajes[contador];

        let cont=document.getElementById("imagenes");
        cont.innerHTML="";

        let img=document.createElement("img");
        img.src=imagenes[contador];
        cont.appendChild(img);

        contador++;

        tamaño+=12;
        let si=document.getElementById("si");
        si.style.fontSize=tamaño+"px";
        si.style.padding=(tamaño/2)+"px";

    }else{
        document.getElementById("titulo").innerText="Ya no puedes decir que no 😈";
    }
};

// botón SI
document.getElementById("si").onclick=()=>{
    document.querySelector(".botones").style.display="none";
    document.getElementById("imagenes").style.display="none";
    document.getElementById("titulo").style.display="none";

    document.getElementById("final").style.display="block";

    lanzarCorazones();
};

// corazones
function lanzarCorazones(){
    setInterval(()=>{
        let heart=document.createElement("div");
        heart.className="corazon";
        heart.innerText="💖";
        heart.style.left=Math.random()*window.innerWidth+"px";
        heart.style.top="100%";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),3000);
    },200);
}

moverNo();
</script>

</body>
</html>
